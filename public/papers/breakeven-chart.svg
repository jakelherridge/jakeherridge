<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Break-even chart. A disciplined cut returns a flat, durable value regardless of adjacent demand. Abundance rises with the adjacent value the freed capacity can create, starting below the cut and crossing above it at roughly one times the freed capacity's cost. Below the break-even, cutting wins; above it, growing wins.">
  <title>Break-even: how much adjacent value abundance needs to beat a disciplined cut</title>
  <text x="92" y="50" font-family="sans-serif" font-size="13" fill="#1d9e75">solid: abundance (reskill or throughput)</text>
  <text x="92" y="69" font-family="sans-serif" font-size="13" fill="#d85a30">dashed: a disciplined cut</text>
  <line x1="80" y1="40" x2="80" y2="330" stroke="#cccccc" stroke-width="1"/>
  <line x1="80" y1="330" x2="690" y2="330" stroke="#cccccc" stroke-width="1"/>
  <text x="72" y="292" text-anchor="end" font-family="sans-serif" font-size="11" fill="#999999">$0</text>
  <text x="72" y="189" text-anchor="end" font-family="sans-serif" font-size="11" fill="#999999">$5M</text>
  <text x="80" y="350" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">0</text>
  <text x="280" y="350" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">1x</text>
  <text x="480" y="350" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">2x</text>
  <text x="680" y="350" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">3x</text>
  <text x="385" y="372" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888888">adjacent value the freed capacity can create (multiple of its cost)</text>
  <line x1="80" y1="226" x2="680" y2="226" stroke="#d85a30" stroke-width="2.5" stroke-dasharray="7,5"/>
  <line x1="80" y1="309" x2="680" y2="82" stroke="#1d9e75" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="300" y1="60" x2="300" y2="330" stroke="#bbbbbb" stroke-width="1" stroke-dasharray="2,3"/>
  <circle cx="300" cy="226" r="4.5" fill="#555555"/>
  <text x="308" y="218" font-family="sans-serif" font-size="11" fill="#555555">break-even</text>
  <text x="180" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a5471f">cut wins here</text>
  <text x="500" y="150" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0f6e56">growth wins here</text>
</svg>
