[build]
  command = "npx playwright install chromium && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force HTTPS and the apex domain.
[[redirects]]
  from = "http://jakeherridge.com/*"
  to = "https://jakeherridge.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.jakeherridge.com/*"
  to = "https://jakeherridge.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.jakeherridge.com/*"
  to = "https://jakeherridge.com/:splat"
  status = 301
  force = true

# Old section URLs live on in the Collection.
[[redirects]]
  from = "/work/*"
  to = "/collection/"
  status = 301

[[redirects]]
  from = "/lab/*"
  to = "/collection/"
  status = 301

# Security headers. CSP keeps script-src 'unsafe-inline' for the inline
# JSON-LD blocks; the site takes no user input, so the XSS surface is nil.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'"

# The Markdown twins are for agents, not search engines.
[[headers]]
  for = "/*.md"
  [headers.values]
    X-Robots-Tag = "noindex"
